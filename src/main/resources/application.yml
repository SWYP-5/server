spring:
  profiles:
    active: local

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/app_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-32-characters-long}
  access-token-expiration: 900000      # 15분 (ms)
  refresh-token-expiration: 2592000000 # 30일 (ms)

server:
  port: 8080